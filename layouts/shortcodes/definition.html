{{/* Handle optional title from named or first positional parameter */}}
{{ $title := .Get "title" | default (.Get 0) }}

<div class="rs-callout rs-callout-definition rs-callout-blue">
  {{ if $title }}
    <div class="rs-callout__title rs-callout__title--panel">
      {{ $title }}
    </div>
  {{ end }}

  <div class="rs-callout__body">
    {{ .Inner | markdownify }}
  </div>
</div>
