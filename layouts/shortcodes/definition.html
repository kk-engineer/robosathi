{{- $title := .Get "title" | default (.Get 0) -}}
<div class="rs-callout rs-callout-definition rs-callout-slate">
  <div class="rs-callout__header">
    <span class="rs-callout__icon" aria-hidden="true">
      <i class="fas fa-book-open"></i>
    </span>
    <span class="rs-callout__label"></span>
    {{- with $title -}}
    <span class="rs-callout__title rs-callout__title--panel">{{ . }}</span>
    {{- end -}}
  </div>
  <div class="rs-callout__body">{{- .Inner | markdownify -}}</div>
</div>
